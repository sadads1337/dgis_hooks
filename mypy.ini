[mypy]
python_version = 3.12
# Allow missing imports (third-party libs) to avoid noise for now
ignore_missing_imports = True
# Don't follow imports (faster, and we only check our code)
follow_imports = silent
# Show error codes to help triage later
show_error_codes = True
# Don't be strict by default; enable gradually
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
warn_return_any = False
warn_unused_configs = True
pretty = True

# Per-module overrides can be added here to progressively increase strictness
